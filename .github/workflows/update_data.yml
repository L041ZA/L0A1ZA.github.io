name: Update Market Data

on:
  schedule:
    # Cada hora, lun–vie (UTC). Cambia a "0 * * * *" si quieres cada hora todos los días.
    - cron: "0 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run data pipeline
        run: python update_market_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickers_summary.json data/tickers_data.js
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
